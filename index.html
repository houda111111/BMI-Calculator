<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>BMI calculator</title>
        <link rel="stylesheet" href="style.css"><link href="https://fonts.googleapis.com/css?family=Poppins:100,100italic,200,200italic,300,300italic,regular,italic,500,500italic,600,600italic,700,700italic,800,800italic,900,900italic" rel="stylesheet" />
    </head>
    <body>
        <div class="container">
            <h1 class="heading">Body Mass Index (BMI) Calculator</h1>
            <p>Your Height (cm) :</p>
            <input type="number" class="input" id="height" value="180" placeholder="Enter Your Height">
            <p>Your Weight (kg) :</p>
            <input type="number" class="input" id="weight" value="80" placeholder="Enter Your Weight">
            <button class="btn" id="btn">Calculator BMI</button>
            <input type="text" class="input" id="bmi-result" disabled>
            <h4>Weight Condition : <span id="bmi-info"></span></h4>
        </div>
        <script src="script.js"></script>
    </body>
</html>
